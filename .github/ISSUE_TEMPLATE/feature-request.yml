name: Feature Request
description: Suggest a new feature for Zepa UI
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a feature for the site, registry, or contributor workflow.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Area
      options:
        - label: Registry / components
        - label: Showcase UI
        - label: Docs
        - label: Install / shadcn CLI
        - label: Other
